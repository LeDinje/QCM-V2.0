<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pôle Sud QCM – Portail</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- Fond typographique : mur de valeurs en lettres ajourees (rempli par script) -->
  <div class="value-cloud" aria-hidden="true"><div class="wall" id="valueWall"></div></div>

  <div class="container">
    <div class="landing">
      <div class="hublot">
        <div class="brand">
          <img src="/assets/logo-polesud.png" alt="Pôle Sud">
          <h1>Pôle Sud • QCM</h1>
          <div class="small">Plateforme d'évaluation candidats</div>
        </div>
        <div class="action-row">
          <a class="btn btn-lg btn-pill shadow-hover neon-hover" href="/candidate">🎯 Espace Candidat</a>
          <a class="btn btn-lg btn-pill shadow-hover neon-hover" href="/admin">🛠️ Espace Admin</a>
        </div>
        <div style="margin-top:10px">
          <a class="btn-outline btn-pill neon-hover" href="/patchnote" style="padding:10px 18px;display:inline-block">📝 Patch Notes</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Remplit le fond avec un "mur" des valeurs, repete et melange, pour couvrir toute la page
    (function(){
      var words = ["Innovation","Proximité","Expertise","Confiance","Réactivité","Engagement",
        "Qualité","Écoute","Sécurité","Performance","Accompagnement","Disponibilité","Rigueur",
        "Passion","Sur-mesure","Infogérance","Bienveillance","Agilité","Transparence","ESN","Supervision",
        "RSE","ISO 9001","ISO 14001"];
      function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
      var el = document.getElementById('valueWall');
      if(!el) return;
      var SEP = "   •   ";
      var block = "";
      for(var i=0;i<60;i++){ block += shuffle(words).join(SEP) + SEP; }
      el.textContent = block;
    })();
  </script>
</body>
</html>
