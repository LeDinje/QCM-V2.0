<!doctype html>
<html lang="fr">
<head>
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pôle Sud QCM – Admin</title>
  <link rel="stylesheet" href="/styles.css">
  <script type="module" src="/js/admin.js"></script>
</head>
<body>
  <div class="container">
    <div class="header">
      <a class="logo" href="/"><img src="/assets/logo-polesud.png" alt="Pôle Sud"> <span>Portail</span></a>
      <a class="logo" href="/">← Portail</a>
      <div class="small">Admin</div>
    </div>

    <div class="card" id="card-auth">
      <h1>Connexion Admin</h1>
      <div class="grid-2">
        <div><input id="email" placeholder="Email"></div>
        <div><input id="password" type="password" placeholder="Mot de passe"></div>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn" id="loginBtn">Se connecter</button>
        <button id="registerBtn">Créer un compte</button>
      </div>
</div>

    <div class="card" id="card-admin" style="display:none">
      <div class="row" style="justify-content:space-between">
        <h1>Gestion • QCM</h1>
        <div class="row">
          <span id="whoami" class="badge"></span>
          <button id="logoutBtn">Se déconnecter</button>
        </div>
      </div>

      <h2>Créer / éditer un QCM</h2>

      <div class="row" style="gap:8px; align-items:flex-end; justify-content:space-between">
        <div style="min-width:280px;flex:1">
          <label class="small" for="quizSelectAdmin">Sélectionner un QCM existant</label><br>
          <select id="quizSelectAdmin"></select>
        </div>
        <div class="row" style="gap:8px">
          <button id="newQuizBtn">Créer un nouveau QCM</button>
          <button class="btn" id="saveQuizBtn">Enregistrer QCM</button>
        </div>
      </div>

      <div class="grid-2" style="margin-top:12px">
        <div>
          <label class="small" for="qTitle">Titre du QCM</label>
          <input id="qTitle" placeholder="Ex : Technicien Helpdesk N1">
        </div>
        <div>
          <label class="small" for="qDesc">Description courte (optionnel)</label>
          <input id="qDesc" placeholder="Ex : 20 questions / 15 min">
        </div>
        <div class="row">
          <label class="small"><input type="checkbox" id="qTimerEnabled"> Timer activé</label>
          <label class="small" for="qTimer" style="margin-left:8px">Minutes</label>
          <input id="qTimer" type="number" min="1" value="10" placeholder="Minutes" style="width:120px">
        </div>
      </div>

      <div style="margin-top:16px">
        <h2>Questions du QCM sélectionné</h2>
        <div id="questionsList" class="list"></div>
        <div class="card" style="margin-top:12px">
          <h3 id="qFormTitle">Ajouter une question</h3>
          <input id="qText" placeholder="Intitulé de la question" style="width:100%; margin-bottom:8px;">
          <div style="margin-bottom:10px">
            <label class="small" style="display:block;margin-bottom:6px;">Image (optionnelle)</label>
            <input id="qImage" type="file" accept="image/*">
            <img id="qImagePreview" alt="Aperçu image" style="display:none;max-width:100%;max-height:240px;margin-top:10px;border-radius:10px;border:1px solid rgba(0,0,0,.08);">
          </div>
          <div class="grid-2">
            <input id="opt0" placeholder="Réponse A">
            <input id="opt1" placeholder="Réponse B">
            <input id="opt2" placeholder="Réponse C">
            <input id="opt3" placeholder="Réponse D">
            <label style="font-size:14px;display:block;margin-top:8px;">
            <input type="checkbox" id="otherEnabled">
            Activer "Autres" (réponse libre)
            </label>

          </div>
          <div class="row" style="margin-top:8px">
            <label class="small">Index de la bonne réponse (0-3)</label>
            <input id="correctIndex" type="number" min="0" max="3" value="0" style="width:100px">
            <button class="btn" id="addQuestionBtn">Ajouter</button>
            <button id="cancelEditBtn" style="display:none">Annuler l'édition</button>
          </div>
        </div>
      </div>

      <hr>
      <h2>Résultats (QCM sélectionné)</h2>
      <div id="resultsList" class="list"></div>
      <div id="candidateDetail" style="margin-top:12px"></div>

      <hr>
      <h2>QCM existants (vue synthèse)</h2>
      <div id="quizzesSummary" class="list"></div>
    </div>
  </div>

  <div id="modalResults" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button id="modalClose" class="btn-outline" style="position:absolute;right:12px;top:12px;">×</button>
      <div id="modalBody" style="margin-top:16px;"></div>
    </div>
  </div>
</body>
</html>
